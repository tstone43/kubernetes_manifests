apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tavily-mcp-http
  namespace: llama-cpp
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: tavily-mcp.stone-lab.local
    http:
      paths:
      - path: /mcp           # ← Now matches your new endpoint
        pathType: Prefix
        backend:
          service:
            name: tavily-mcp
            port:
              number: 8000