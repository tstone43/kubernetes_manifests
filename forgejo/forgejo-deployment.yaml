apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: rook-cephfs
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:11.0.11
          ports:
            - containerPort: 3000
          env:
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgres.forgejo.svc.cluster.local:5432
            - name: FORGEJO__database__NAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-credentials
                  key: database
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-credentials
                  key: username
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-credentials
                  key: password
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__server__ROOT_URL
              value: "https://git.stone-lab.local/"
            - name: FORGEJO__server__SSH_DOMAIN
              value: "git.stone-lab.local"  
            - name: FORGEJO__repository__ROOT
              value: "/data/git/repositories"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-web
  namespace: forgejo
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: forgejo
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-ssh
  namespace: forgejo
spec:
  type: NodePort
  selector:
    app: forgejo
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30222


