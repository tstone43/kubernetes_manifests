apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-data
  namespace: actual-budget  # Change to your namespace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi  # Plenty for budgets
  storageClassName: rook-cephfs  # Your K3s default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
  labels:
    app: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
      - name: actual-server
        image: docker.io/actualbudget/actual-server:latest
        ports:
        - containerPort: 5006
        env:
        # Uncomment/add any of these as needed:
        # - name: ACTUAL_HTTPS_KEY
        #   value: /data/selfhost.key
        # - name: ACTUAL_HTTPS_CERT
        #   value: /data/selfhost.crt
        # - name: ACTUAL_PORT
        #   value: "5006"
        # - name: ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB
        #   value: "20"
        volumeMounts:
        - name: actual-data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - node
            - src/scripts/health-check.js
          initialDelaySeconds: 20
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      volumes:
      - name: actual-data
        persistentVolumeClaim:
          claimName: actual-data
---
apiVersion: v1
kind: Service
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  selector:
    app: actual-budget
  ports:
  - port: 5006
    targetPort: 5006
    name: http