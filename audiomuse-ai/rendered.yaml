apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-audiomuse-ai-flask
  namespace: audiomuse-ai # Use .Release.Namespace
  labels:
    helm.sh/chart: audiomuse-ai-1.0.36
    app.kubernetes.io/name: audiomuse-ai
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-ai
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: flask
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-ai
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: flask
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: flask-app
          image: "ghcr.io/neptunehub/audiomuse-ai:0.8.6"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SERVICE_TYPE
              value: "flask"
            - name: JELLYFIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-jellyfin
                  key: user_id
            - name: JELLYFIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-jellyfin
                  key: api_token
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_DB
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-gemini
                  key: GEMINI_API_KEY
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-mistral
                  key: MISTRAL_API_KEY
            - name: AI_CHAT_DB_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-ai-chat-db
                  key: AI_CHAT_DB_USER_PASSWORD
            - name: NAVIDROME_USER
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-navidrome
                  key: NAVIDROME_USER
            - name: NAVIDROME_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-navidrome
                  key: NAVIDROME_PASSWORD
            - name: LYRION_USER
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-lyrion
                  key: LYRION_USER
            - name: LYRION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-lyrion
                  key: LYRION_PASSWORD
          envFrom:
            - configMapRef:
                name: release-name-audiomuse-ai-env-vars
          volumeMounts:
            - name: app-temp-audio
              mountPath: /app/temp_audio
      volumes:
        - name: app-temp-audio
          emptyDir: {}
