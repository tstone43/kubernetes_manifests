# Source: audiomuse-ai/templates/postgres.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-audiomuse-ai-postgres
  namespace: audiomuse-ai # Use .Release.Namespace
  labels:
    helm.sh/chart: audiomuse-ai-1.0.36
    app.kubernetes.io/name: audiomuse-ai
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-ai
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-ai
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:15-alpine"
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: release-name-audiomuse-ai-postgres
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: release-name-audiomuse-ai-postgres-pvc
